<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script src="/login.js" defer></script>
  </head>
  <body class="bg-light">
    <div class="container" style="max-width: 400px; margin-top: 100px;">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="h4 mb-3 text-center">Connexion</h1>
          <div id="error-message" class="alert alert-danger d-none"></div>
          <form id="login-form">
            <div class="mb-3">
              <input
                type="text"
                id="username"
                name="username"
                class="form-control"
                placeholder="Nom d'utilisateur"
                required
              />
            </div>
            <div class="mb-3">
              <input
                type="password"
                id="password"
                name="password"
                class="form-control"
                placeholder="Mot de passe"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary w-100">Se connecter</button>
          </form>

          <form id="twofa-form" class="d-none">
            <label for="totp" class="form-label">Code à 6 chiffres</label>
            <input
              type="text"
              id="totp"
              class="form-control mb-3"
              inputmode="numeric"
              maxlength="6"
              placeholder="123456"
              required
            />
            <button type="submit" class="btn btn-success w-100">Vérifier</button>
          </form>

          <p class="text-center mt-3 mb-0">
            <a href="/register.html">Pas encore inscrit ? S'inscrire</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
