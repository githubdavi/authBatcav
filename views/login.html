<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script src="/login.js" defer></script>
    <style>
      .btn-provider {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        width: 100%;
        padding: 0.55rem 0.9rem;
        border-radius: 0.5rem;
        border: 1px solid transparent;
        font-weight: 500;
        text-decoration: none;
      }
      .btn-provider + .btn-provider {
        margin-top: 0.5rem;
      }
      .btn-provider svg {
        width: 20px;
        height: 20px;
        flex: 0 0 20px;
      }
      .btn-provider span {
        flex: 1 1 auto;
        text-align: center;
      }
      .btn-google {
        background: #fff;
        color: #1f1f1f;
        border-color: #dadce0;
      }
      .btn-google:hover {
        background: #f7f8f8;
        color: #1f1f1f;
      }
      .btn-github {
        background: #1f2328;
        color: #fff;
      }
      .btn-github:hover {
        background: #32383f;
        color: #fff;
      }
      .btn-facebook {
        background: #1877f2;
        color: #fff;
      }
      .btn-facebook:hover {
        background: #166fe5;
        color: #fff;
      }
      .separator {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin: 1.25rem 0 1rem;
        color: #6c757d;
        font-size: 0.875rem;
      }
      .separator::before,
      .separator::after {
        content: "";
        flex: 1;
        border-top: 1px solid #dee2e6;
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container" style="max-width: 400px; margin-top: 100px;">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="h4 mb-3 text-center">Connexion</h1>
          <div id="error-message" class="alert alert-danger d-none"></div>
          <form id="login-form">
            <div class="mb-3">
              <input
                type="text"
                id="username"
                name="username"
                class="form-control"
                placeholder="Nom d'utilisateur"
                required
              />
            </div>
            <div class="mb-3">
              <input
                type="password"
                id="password"
                name="password"
                class="form-control"
                placeholder="Mot de passe"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary w-100">Se connecter</button>
          </form>

          <form id="twofa-form" class="d-none">
            <label for="totp" class="form-label">Code à 6 chiffres</label>
            <input
              type="text"
              id="totp"
              class="form-control mb-3"
              inputmode="numeric"
              maxlength="6"
              placeholder="123456"
              required
            />
            <button type="submit" class="btn btn-success w-100">Vérifier</button>
          </form>

          <div id="oauth-block">
            <div class="separator">ou continuer avec</div>

            <a href="/auth/google" class="btn-provider btn-google">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="#4285F4"
                  d="M23.52 12.27c0-.79-.07-1.54-.2-2.27H12v4.51h6.47a5.54 5.54 0 0 1-2.4 3.63v3h3.88c2.27-2.09 3.57-5.17 3.57-8.87z"
                />
                <path
                  fill="#34A853"
                  d="M12 24c3.24 0 5.96-1.08 7.95-2.91l-3.88-3.01c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96H1.26v3.09A12 12 0 0 0 12 24z"
                />
                <path
                  fill="#FBBC05"
                  d="M5.27 14.28a7.2 7.2 0 0 1 0-4.56V6.63H1.26a12 12 0 0 0 0 10.74l4.01-3.09z"
                />
                <path
                  fill="#EA4335"
                  d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.44-3.44C17.95 1.19 15.24 0 12 0A12 12 0 0 0 1.26 6.63l4.01 3.09C6.22 6.87 8.87 4.75 12 4.75z"
                />
              </svg>
              <span>Se connecter avec Google</span>
            </a>

            <a href="/auth/github" class="btn-provider btn-github">
              <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                <path
                  d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"
                />
              </svg>
              <span>Se connecter avec GitHub</span>
            </a>

            <a href="/auth/facebook" class="btn-provider btn-facebook">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path
                  d="M24 12.07C24 5.4 18.63 0 12 0S0 5.4 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.05V9.41c0-3.02 1.79-4.69 4.53-4.69 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.96.93-1.96 1.89v2.25h3.33l-.53 3.49h-2.8V24C19.61 23.1 24 18.1 24 12.07z"
                />
              </svg>
              <span>Se connecter avec Facebook</span>
            </a>
          </div>

          <p class="text-center mt-3 mb-0">
            <a href="/register.html">Pas encore inscrit ? S'inscrire</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
