<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activation 2FA — Batcave</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="/setup-2fa.js" defer></script>
  </head>
  <body class="bg-dark text-light">
    <div class="container" style="max-width: 480px; margin-top: 60px">
      <div class="card shadow-sm">
        <div class="card-body text-dark">
          <h1 class="h4 mb-3 text-center">Double authentification (2FA)</h1>
          <div id="error-message" class="alert alert-danger d-none"></div>

          <div class="mb-3">
            <label for="username" class="form-label">Nom d'utilisateur</label>
            <div class="input-group">
              <input
                type="text"
                id="username"
                class="form-control"
                placeholder="admin"
              />
              <button id="generate-btn" class="btn btn-primary">
                Générer le QR
              </button>
            </div>
          </div>

          <div id="qr-section" class="text-center d-none">
            <p class="mb-2">Scannez ce QR code avec Google Authenticator :</p>
            <img
              id="qr-code"
              alt="QR Code 2FA"
              class="img-fluid border rounded mb-3"
            />
            <p class="mb-1">Clé de secours (si le scan est impossible) :</p>
            <code id="secret" class="d-block mb-3"></code>

            <hr />
            <p class="mb-2">Entrez le code à 6 chiffres pour confirmer :</p>
            <form id="verify-form">
              <div class="input-group">
                <input
                  type="text"
                  id="totp"
                  class="form-control"
                  inputmode="numeric"
                  maxlength="6"
                  placeholder="123456"
                  required
                />
                <button type="submit" class="btn btn-success">Confirmer</button>
              </div>
            </form>
            <div id="verify-message" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
