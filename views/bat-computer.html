<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bat-Computer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body class="bg-dark text-light">
    <div class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1 class="mb-0">Bienvenue, Justicier <span id="username"></span></h1>
          <p class="mb-0 text-muted">
            <span id="user-email"></span>
            <span id="user-role" class="badge bg-secondary ms-2"></span>
            <span id="user-provider" class="badge bg-info text-dark ms-2"></span>
          </p>
        </div>
        <button id="logout-btn" class="btn btn-outline-light btn-sm">
          Déconnexion
        </button>
      </div>

      <h2 class="h4 mb-3">Arsenal</h2>
      <div id="gadgets" class="row g-3"></div>
    </div>

    <script src="/dashboard.js" defer></script>
  </body>
</html>
