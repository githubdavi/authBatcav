<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bat-Computer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body class="bg-dark text-light">
    <div class="container py-5">
      <h1 class="mb-4">Bienvenue, Justicier <span id="username"></span></h1>

      <h2 class="h4 mb-3">Arsenal</h2>
      <div id="gadgets" class="row g-3"></div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        try {
          // L'utilisateur
          const response = await fetch("/api/me");
          const user = await response.json();
          document.querySelector("#username").textContent = user.name;

          // Les gadgets (tableau)
          const gadgetsResponse = await fetch("/api/secrets");
          const gadgets = await gadgetsResponse.json();

          const container = document.querySelector("#gadgets");
          gadgets.forEach((gadget) => {
            const col = document.createElement("div");
            col.className = "col-12 col-md-6 col-lg-4";
            col.innerHTML = `
              <div class="card h-100 shadow-sm">
                <div class="card-body">
                  <h5 class="card-title">
                    <i class="fa-solid ${gadget.icon} me-2"></i>${gadget.name}
                  </h5>
                  <p class="card-text text-muted">${gadget.desc}</p>
                </div>
              </div>`;
            container.appendChild(col);
          });
        } catch (e) {
          console.error("Erreur de chargement :", e);
        }
      });
    </script>
  </body>
</html>
